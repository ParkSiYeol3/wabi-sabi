name: E2E Smoke (production)

# 프리뷰는 SSO 보호라 병합 후 프로덕션(wasa.kr)을 스모크한다.
# 배포 완료 여유를 두고 90초 대기 후 실행. 수동 실행도 가능.
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths: [web/**]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Wait for Vercel deploy
        run: sleep 90
      - run: npm run test:e2e
