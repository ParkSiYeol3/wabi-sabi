# 의존성 취약점·업데이트 자동 PR (보안_체크리스트 P1)
version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    # 보안 패치는 즉시 개별 PR, 일반 업데이트는 minor/patch 묶음으로 소음 최소화
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ["dependencies"]
    commit-message:
      prefix: "ci"
